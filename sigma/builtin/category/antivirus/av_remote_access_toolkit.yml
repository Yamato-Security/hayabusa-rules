            - NanoCore
            - NJRat
            - Paralax
            - PlugX
            - Pulsar
            - Quasar
            - Remcos
            - Ravartar
            - RemoteAdmin
            - RemoteTool
            - revengeRAT
            - rokRAT
            - salatstealer
            - Salgorea
            - SmokedHam
            - TigerRat
            - Tzeebot
            - WarZone
            - VenomRAT
            - Vidar
            - Wirenet
            - XWorm
            - Zapchast
