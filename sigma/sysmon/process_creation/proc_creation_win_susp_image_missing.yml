title: Execution Of Non-Existing File
id: 0bc4806e-0a61-4a03-5e7a-8c1a0d342594
related:
    - id: 71158e3f-df67-472b-930e-7d287acaa3e1
      type: derived
status: test
description: |
    Detects process creation events where the Image field lacks an absolute path,
    which occurs when the backing file no longer exists on disk at the time of
    logging - commonly caused by Process Ghosting or other unorthodox process creation techniques.
references:
    - https://pentestlaboratories.com/2021/12/08/process-ghosting/
    - https://www.elastic.co/blog/process-ghosting-a-new-executable-image-tampering-attack
author: Max Altgelt (Nextron Systems)
date: 2021-12-09
modified: 2026-07-05
tags:
    - attack.stealth
    - attack.privilege-escalation
    - attack.t1055
    - sysmon
logsource:
    category: process_creation
    product: windows
detection:
    process_creation:
        EventID: 1
        Channel: Microsoft-Windows-Sysmon/Operational
    filter_main_image_absolute_path:
        Image|contains: \
    filter_optional_null:
        Image: null
    filter_optional_empty:
        Image:
            - '-'
            - ''
    filter_optional_4688:
        - Image:
              - MemCompression
              - Registry
              - System
              - vmmem
              - vmmemWSL
        - CommandLine:
              - MemCompression
              - Registry
              - vmmem
              - vmmemWSL
    condition: process_creation and (not 1 of filter_main_* and not 1 of filter_optional_*)
falsepositives:
    - Unknown
level: high
ruletype: Sigma
